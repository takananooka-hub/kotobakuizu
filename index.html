function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function pad2(n){ return String(n).padStart(2,"0"); }
function formatMs(ms){
  const m = Math.floor(ms/60000);
  const s = Math.floor((ms%60000)/1000);
  const r = ms%1000;
  return `${pad2(m)}:${pad2(s)}.${String(r).padStart(3,"0")}`;
}

function modeLabel(){
  const cat = document.getElementById("cat").value;
  if(cat==="emotion") return "しゅつだい：きもち（心情）";
  if(cat==="person") return "しゅつだい：ひと（人物）";
  if(cat==="thing") return "しゅつだい：もの（事物）";
  return "しゅつだい：まぜる（ぜんぶ）";
}

function setPills(){
  document.getElementById("modePill").textContent = modeLabel();
  document.getElementById("progressPill").textContent =
    startAt ? `もんだい ${idx+1}/${deck.length}` : "まだ はじめていません";
}

function setTimePill(){
  document.getElementById("timePill").textContent =
    startAt ? formatMs(Date.now() - startAt) : "00:00.000";
}

function loadBest(){
  const v = localStorage.getItem(BEST_KEY);
  if(!v) return null;
  const ms = Number(v);
  if(!Number.isFinite(ms)) return null;
  return ms;
}
function showBest(){
  const best = loadBest();
  const txt = best==null ? "さいこう たいむ：—" : `さいこう たいむ：${formatMs(best)}`;
  document.getElementById("bestLine").textContent = txt;
  document.getElementById("bestAfter").textContent = txt;
}
function saveBestIfNeeded(ms){
  const best = loadBest();
  if(best==null || ms < best){
    localStorage.setItem(BEST_KEY, String(ms));
    return true;
  }
  return false;
}

function clueFor(item){
  const cat = document.getElementById("cat").value;
  if(cat==="mix"){
    return CLUE.emotion[item.id] || CLUE.person[item.id] || CLUE.thing[item.id] || "このことばに あう ようすは？";
  }
  return (CLUE[cat] && CLUE[cat][item.id]) ? CLUE[cat][item.id] : "このことばに あう ようすは？";
}

function makeQuestion(item, allItems){
  const clue = clueFor(item);
  const others = shuffle(allItems.filter(x=>x.id!==item.id)).slice(0,3);
  const options = shuffle([item, ...others]);
  return { correct:item, clue, options };
}

let current = null;

function renderQuestion(){
  locked = false;
  const msg = document.getElementById("msg");
  msg.textContent = "";
  msg.className = "msg";

  setPills();
  document.getElementById("score").textContent = String(score);
  document.getElementById("remain").textContent = String(deck.length - idx);

  const pool = getPool();
  const item = deck[idx];
  current = makeQuestion(item, pool);

  document.getElementById("prompt").textContent = `【ようす】${current.clue}\n\nいちばん あう ことばは どれ？`;

  const box = document.getElementById("choices");
  box.innerHTML = "";
  current.options.forEach((opt, i)=>{
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.type = "button";
    btn.dataset.id = opt.id;
    btn.innerHTML = `${["A","B","C","D"][i]}. <strong>${opt.label}</strong><small>ここを おして こたえる</small>`;
    btn.addEventListener("click", ()=>choose(opt.id, btn));
    box.appendChild(btn);
  });
}

function choose(chosenId, btnEl){
  if(locked) return;
  locked = true;

  const buttons = Array.from(document.querySelectorAll(".choice"));
  const correctId = current.correct.id;

  buttons.forEach(b=>{
    if(b.dataset.id === correctId) b.classList.add("correct");
  });

  const msg = document.getElementById("msg");
  if(chosenId === correctId){
    score++;
    msg.textContent = "せいかい！";
    msg.classList.add("good");
  }else{
    btnEl.classList.add("wrong");
    msg.textContent = `ざんねん… せいかいは「${current.correct.label}」`;
    msg.classList.add("bad");
  }

  document.getElementById("score").textContent = String(score);
  document.getElementById("remain").textContent = String(deck.length - idx);

  setTimeout(()=>{
    idx++;
    if(idx >= deck.length){
      finish();
    }else{
      renderQuestion();
    }
  }, 750);
}

function start(){
  const n = Number(document.getElementById("numQ").value);
  const pool = getPool();
  deck = shuffle(pool).slice(0, Math.min(n, pool.length));
  idx = 0;
  score = 0;

  document.getElementById("preArea").style.display = "none";
  document.getElementById("resultArea").style.display = "none";
  document.getElementById("quizArea").style.display = "block";

  startAt = Date.now();
  clearInterval(timer);
  timer = setInterval(setTimePill, 30);

  renderQuestion();
  setTimePill();
}

function finish(){
  clearInterval(timer);
  timer = null;
  const ms = Date.now() - startAt;

  document.getElementById("quizArea").style.display = "none";
  document.getElementById("resultArea").style.display = "block";

  document.getElementById("finalTime").textContent = formatMs(ms);
  document.getElementById("finalScore").textContent = `${score}/${deck.length}`;

  const improved = saveBestIfNeeded(ms);
  showBest();
  if(improved){
    document.getElementById("bestAfter").textContent = `さいこう こうしん！ ${formatMs(ms)}`;
  }

  startAt = null;
  setPills();
  setTimePill();
}

function backToTop(){
  clearInterval(timer);
  timer = null;
  startAt = null;

  document.getElementById("quizArea").style.display = "none";
  document.getElementById("resultArea").style.display = "none";
  document.getElementById("preArea").style.display = "block";

  setPills();
  setTimePill();
  showBest();
}

document.getElementById("startBtn").addEventListener("click", start);
document.getElementById("retryBtn").addEventListener("click", start);
document.getElementById("backBtn").addEventListener("click", backToTop);
document.getElementById("resetBestBtn").addEventListener("click", ()=>{
  localStorage.removeItem(BEST_KEY);
  showBest();
  alert("きろくを けしました。");
});
document.getElementById("cat").addEventListener("change", ()=>setPills());

showBest();
setPills();
setTimePill();
</script>
</body>
</html>
